# Configuration file

general {

    "client settings" {
        # Whether or not to show set bonus information in discovered set item tooltips
        B:"1. Enable Tooltips"=true
    }

    "server settings" {
        # FILLSCREEN Each item you want to include in a set needs to be defined here first
        # 
        # Layout is...
        # Equipment id, domain:item:meta > nbtkey1 = nbtvalue1 & nbtkey2 = nbtvalue2...
        # The equipment id must be unique, and is only used to refer to the item in the equipment set config
        # 
        # eg...
        # 
        # SSword, stone_sword
        # DSword, diamond_sword
        # 
        # DDagger, backstab:diamond_dagger
        # 
        # TetraSickleSingle, tetra:duplex_tool_modular > duplex/sickle_left_material & duplex/butt_right_material
        # 
        # WirtsLeggings, diamond_leggings > display:Name = "Wirt's Leggings" & ench: = minecraft:protection ; lvl:4s
        #  
        S:"1. Equipment" <
            item_netherite_paxel, pickletweaks:platinum_paxel
            item_golden_helmet, golden_helmet > Quality:Name = "quality.masterful.name"
            item_golden_chestplate, golden_chestplate > Quality:Name = "quality.masterful.name"
            item_golden_leggings, golden_leggings > Quality:Name = "quality.masterful.name"
            item_golden_boots, golden_boots > Quality:Name = "quality.masterful.name"
            
            item_iron_helmet, iron_helmet > Quality:Name = "quality.masterful.name"
            item_iron_chestplate, iron_chestplate > Quality:Name = "quality.masterful.name"
            item_iron_leggings, iron_leggings > Quality:Name = "quality.masterful.name"
            item_iron_boots, iron_boots > Quality:Name = "quality.masterful.name"
            
            item_diamond_helmet, diamond_helmet > Quality:Name = "quality.masterful.name"
            item_diamond_chestplate, diamond_chestplate > Quality:Name = "quality.masterful.name"
            item_diamond_leggings, diamond_leggings > Quality:Name = "quality.masterful.name"
            item_diamond_boots, diamond_boots > Quality:Name = "quality.masterful.name"
            
            item_toughasnails_wool_helmet, toughasnails:wool_helmet
            item_toughasnails_wool_chestplate, toughasnails:wool_chestplate
            item_toughasnails_wool_leggings, toughasnails:wool_leggings
            item_toughasnails_wool_boots, toughasnails:wool_boots
            
            item_toughasnails_jelled_slime_helmet, toughasnails:jelled_slime_helmet
            item_toughasnails_jelled_slime_chestplate, toughasnails:jelled_slime_chestplate
            item_toughasnails_jelled_slime_leggings, toughasnails:jelled_slime_leggings
            item_toughasnails_jelled_slime_boots, toughasnails:jelled_slime_boots
            
            item_futuremc_netherite_helmet, futuremc:netherite_helmet > Quality:Name = "quality.masterful.name"
            item_futuremc_netherite_chestplate, futuremc:netherite_chestplate > Quality:Name = "quality.masterful.name"
            item_futuremc_netherite_leggings, futuremc:netherite_leggings > Quality:Name = "quality.masterful.name"
            item_futuremc_netherite_boots, futuremc:netherite_boots > Quality:Name = "quality.masterful.name"
            
            item_aether_legacy_gravitite_helmet, aether_legacy:gravitite_helmet > Quality:Name = "quality.masterful.name"
            item_aether_legacy_gravitite_chestplate, aether_legacy:gravitite_chestplate > Quality:Name = "quality.masterful.name"
            item_aether_legacy_gravitite_leggings, aether_legacy:gravitite_leggings > Quality:Name = "quality.masterful.name"
            item_aether_legacy_gravitite_boots, aether_legacy:gravitite_boots > Quality:Name = "quality.masterful.name"
            
            item_aether_legacy_neptune_helmet, aether_legacy:neptune_helmet > Quality:Name = "quality.masterful.name"
            item_aether_legacy_neptune_chestplate, aether_legacy:neptune_chestplate > Quality:Name = "quality.masterful.name"
            item_aether_legacy_neptune_leggings, aether_legacy:neptune_leggings > Quality:Name = "quality.masterful.name"
            item_aether_legacy_neptune_boots, aether_legacy:neptune_boots > Quality:Name = "quality.masterful.name"
            
            item_aether_legacy_phoenix_helmet, aether_legacy:phoenix_helmet > Quality:Name = "quality.masterful.name"
            item_aether_legacy_phoenix_chestplate, aether_legacy:phoenix_chestplate > Quality:Name = "quality.masterful.name"
            item_aether_legacy_phoenix_leggings, aether_legacy:phoenix_leggings > Quality:Name = "quality.masterful.name"
            item_aether_legacy_phoenix_boots, aether_legacy:phoenix_boots > Quality:Name = "quality.masterful.name"
            
            item_aether_legacy_obsidian_helmet, aether_legacy:obsidian_helmet > Quality:Name = "quality.masterful.name"
            item_aether_legacy_obsidian_chestplate, aether_legacy:obsidian_chestplate > Quality:Name = "quality.masterful.name"
            item_aether_legacy_obsidian_leggings, aether_legacy:obsidian_leggings > Quality:Name = "quality.masterful.name"
            item_aether_legacy_obsidian_boots, aether_legacy:obsidian_boots > Quality:Name = "quality.masterful.name"
            
            item_aether_legacy_valkyrie_helmet, aether_legacy:valkyrie_helmet > Quality:Name = "quality.masterful.name"
            item_aether_legacy_valkyrie_chestplate, aether_legacy:valkyrie_chestplate > Quality:Name = "quality.masterful.name"
            item_aether_legacy_valkyrie_leggings, aether_legacy:valkyrie_leggings > Quality:Name = "quality.masterful.name"
            item_aether_legacy_valkyrie_boots, aether_legacy:valkyrie_boots > Quality:Name = "quality.masterful.name"
            
            
         >

        # FILLSCREEN Each equipment set is defined here
        # Each equip id must be defined in the Equipment list first
        # 
        # Layout is...
        # Set id, set name, slot | slot = equip id | equip id, slot | slot = equip id | equip id, etc.
        # 
        # - Vanilla slots: mainhand, offhand, head, chest, legs, feet, hotbar, inventory
        # - Baubles slots: bauble_amulet, bauble_ring, bauble_belt, bauble_head, bauble_body, bauble_charm, bauble_trinket
        # - You can also refer to slots by their slot number, eg. the top-left slot of the inventory is 9
        # 
        # eg...
        # 
        # SnD, Sword and Dagger, mainhand | offhand = WSword | SSword | ISword | GSword | DSword, mainhand | offhand = WDagger | SDagger | IDagger | GDagger | DDagger
        # 
        # DArmor, Diamond Armor, head = DHelm, chest = DChest, legs = DLegs, feet = DBoots
        #  
        S:"2. Equipment Sets" <
            set_netherite_paxel, Fastest Miner, mainhand = item_netherite_paxel
            set_golden, Fast Miner, head = item_golden_helmet, chest = item_golden_chestplate, legs = item_golden_leggings, feet = item_golden_boots
            set_iron, Iron Man, head = item_iron_helmet, chest = item_iron_chestplate, legs = item_iron_leggings, feet = item_iron_boots
            set_diamond, Diamond Man, head = item_diamond_helmet, chest = item_diamond_chestplate, legs = item_diamond_leggings, feet = item_diamond_boots
            set_toughasnails_wool, Warm Feet, head = item_toughasnails_wool_helmet, chest = item_toughasnails_wool_chestplate, legs = item_toughasnails_wool_leggings, feet = item_toughasnails_wool_boots
            set_toughasnails_jelled_slime, Cool Man, head = item_toughasnails_jelled_slime_helmet, chest = item_toughasnails_jelled_slime_chestplate, legs = item_toughasnails_jelled_slime_leggings, feet = item_toughasnails_jelled_slime_boots
            set_futuremc_netherite, Tough Armor, head = item_futuremc_netherite_helmet, chest = item_futuremc_netherite_chestplate, legs = item_futuremc_netherite_leggings, feet = item_futuremc_netherite_boots
            set_aether_legacy_gravitite, Jumper, head = item_aether_legacy_gravitite_helmet, chest = item_aether_legacy_gravitite_chestplate, legs = item_aether_legacy_gravitite_leggings, feet = item_aether_legacy_gravitite_boots
            set_aether_legacy_neptune, Neptune, head = item_aether_legacy_neptune_helmet, chest = item_aether_legacy_neptune_chestplate, legs = item_aether_legacy_neptune_leggings, feet = item_aether_legacy_neptune_boots
            set_aether_legacy_phoenix, Hot Man, head = item_aether_legacy_phoenix_helmet, chest = item_aether_legacy_phoenix_chestplate, legs = item_aether_legacy_phoenix_leggings, feet = item_aether_legacy_phoenix_boots
            set_aether_legacy_obsidian, Tough Guy, head = item_aether_legacy_obsidian_helmet, chest = item_aether_legacy_obsidian_chestplate, legs = item_aether_legacy_obsidian_leggings, feet = item_aether_legacy_obsidian_boots
            set_aether_legacy_valkyrie, Flight, head = item_aether_legacy_valkyrie_helmet, chest = item_aether_legacy_valkyrie_chestplate, legs = item_aether_legacy_valkyrie_leggings, feet = item_aether_legacy_valkyrie_boots
            
         >

        # FILLSCREEN Each bonus is defined here
        # 
        # Layout is...
        # Bonus id, bonus name, discovery mode, requirement, requirement, requirement, etc.
        # 
        # Discovery mode is a number:
        # 0 = hidden until the player has activated the bonus at least once
        # 1 = always visible
        # 2 = always hidden
        # 
        # Each requirement is one of these:
        # A set; just put in the set id.  For a partial set, add a period and the number of set items required
        # an attribute total; put in the attribute name followed by a sign and a number, eg.
        # generic.armor > 7
        # 
        # eg...
        # 
        # DualWieldSnD, Dual Wield, 0, SnD, generic.armor <= 5
        #  
        S:"2f. Bonuses" <
            bonus_netherite_paxel,  Haste III, 2, set_netherite_paxel
            bonus_golden,  Haste, 1, set_golden
            bonus_iron,  Iron Skin, 1, set_iron
            bonus_diamond,  Diamond Skin, 1, set_diamond
            bonus_toughasnails_wool,  Cold Resistance, 1, set_toughasnails_wool
            bonus_toughasnails_jelled_slime,  Heat Resistance, 1, set_toughasnails_jelled_slime
            bonus_futuremc_netherite,  Full Resistance, 1, set_futuremc_netherite
            bonus_aether_legacy_gravitite,  Jump Boost, 1, set_aether_legacy_gravitite
            bonus_aether_legacy_neptune,  Water Breathing, 1, set_aether_legacy_neptune
            bonus_aether_legacy_phoenix,  Fire & Heat Resistance, 1, set_aether_legacy_phoenix
            bonus_aether_legacy_obsidian,  Resistance, 1, set_aether_legacy_obsidian
            bonus_aether_legacy_valkyrie,  Flying, 1, set_aether_legacy_valkyrie
            
         >

        # FILLSCREEN Attribute modifiers you receive as part of a bonus
        # 
        # Layout is...
        # Bonus id, attribute = amount @ operation, attribute = amount @ operation, etc.
        # 
        # eg...
        # 
        # This makes the Dual Wield bonus from the bonus example give a 50% attack damage bonus
        # DualWieldSnD, generic.attackDamage = 0.5 @ 1
        #  
        S:"3. Attribute Modifiers" <
            
         >

        # FILLSCREEN Constant potion effects received as part of a bonus
        # 
        # Layout is...
        # Bonus id, potion.level.duration.interval, potion.level.duration.interval, etc.
        # 
        # eg...
        # 
        # This makes the Dual Wield bonus from the bonus example give haste 2
        # DualWieldSnD, haste.2
        # 
        # And this does the same thing, but the potion effect is only active for 5 seconds, every 10 seconds (5 on, 5 off, repeat)
        # DualWieldSnD, haste.2.100.200
        #  
        S:"4. Potion Effects" <
            bonus_netherite_paxel, haste.3
            bonus_golden, haste.1
            bonus_iron, potioncore:iron_skin.1
            bonus_diamond, potioncore:diamond_skin.1
            bonus_toughasnails_wool, toughasnails:cold_resistance.1
            bonus_toughasnails_jelled_slime, toughasnails:heat_resistance.1
            bonus_futuremc_netherite, resistance.1
            bonus_aether_legacy_gravitite, jump_boost.5
            bonus_aether_legacy_neptune, water_breathing.1
            bonus_aether_legacy_phoenix, fire_resistance.1
            bonus_aether_legacy_phoenix, toughasnails:heat_resistance.1
            bonus_aether_legacy_obsidian, resistance.3
            bonus_futuremc_netherite, toughasnails:heat_resistance.1
            bonus_futuremc_netherite, toughasnails:cold_resistance.1
            bonus_futuremc_netherite, fire_resistance.1
            bonus_aether_legacy_valkyrie, potioncore:flight.1
            
         >
    }

}


